<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f0a0a"/><stop offset="100%" stop-color="#1a0d0d"/>
    </linearGradient>
    <linearGradient id="bgR" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#080d1a"/><stop offset="100%" stop-color="#0a0d22"/>
    </linearGradient>
    <linearGradient id="techG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9B59B6"/><stop offset="100%" stop-color="#3498DB"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2980B9"/><stop offset="50%" stop-color="#3498DB"/><stop offset="100%" stop-color="#1a6fa8"/>
    </linearGradient>
    <linearGradient id="rocketNose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8E44AD"/><stop offset="50%" stop-color="#9B59B6"/><stop offset="100%" stop-color="#7D3C98"/>
    </linearGradient>
    <linearGradient id="upG" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3498DB"/><stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27AE60" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flameG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#E74C3C" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="flameGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Backgrounds -->
  <rect width="420" height="480" fill="url(#bgL)"/>
  <rect x="460" width="420" height="480" fill="url(#bgR)"/>
  <!-- Center fade bridge -->
  <rect x="400" width="80" height="480" fill="url(#techG)" opacity="0.12"/>

  <!-- ═══ LEFT — ANTES ═══ -->
  <text x="210" y="38" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700"
        letter-spacing="5" text-anchor="middle" fill="#E74C3C" opacity="0.75">A N T E S</text>

  <!-- Storm clouds -->
  <ellipse cx="150" cy="72" rx="55" ry="20" fill="#1e1414" opacity="0.9"/>
  <ellipse cx="195" cy="65" rx="42" ry="18" fill="#241515" opacity="0.85"/>
  <ellipse cx="245" cy="72" rx="48" ry="17" fill="#1e1414" opacity="0.8"/>
  <ellipse cx="290" cy="68" rx="36" ry="15" fill="#221313" opacity="0.7"/>
  <!-- Lightning from cloud -->
  <polyline points="210,88 204,108 213,108 206,128" stroke="#E74C3C" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Rain lines -->
  <line x1="148" y1="91" x2="143" y2="107" stroke="#3a2a2a" stroke-width="1.5" opacity="0.6"/>
  <line x1="168" y1="89" x2="163" y2="105" stroke="#3a2a2a" stroke-width="1.5" opacity="0.5"/>
  <line x1="235" y1="88" x2="230" y2="104" stroke="#3a2a2a" stroke-width="1.5" opacity="0.5"/>
  <line x1="260" y1="90" x2="255" y2="106" stroke="#3a2a2a" stroke-width="1.5" opacity="0.4"/>
  <line x1="285" y1="84" x2="280" y2="100" stroke="#3a2a2a" stroke-width="1.5" opacity="0.4"/>

  <!-- Clock face -->
  <circle cx="205" cy="195" r="72" fill="none" stroke="#2e2e2e" stroke-width="3" opacity="0.8"/>
  <circle cx="205" cy="195" r="65" fill="#111010" stroke="#242424" stroke-width="1.5"/>
  <!-- Hour marks -->
  <line x1="205" y1="131" x2="205" y2="143" stroke="#3a3a3a" stroke-width="2.5"/>
  <line x1="267" y1="152" x2="261" y2="162" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="268" y1="222" x2="258" y2="217" stroke="#2e2e2e" stroke-width="2"/>
  <line x1="205" y1="258" x2="205" y2="247" stroke="#3a3a3a" stroke-width="2.5"/>
  <line x1="143" y1="222" x2="153" y2="217" stroke="#2e2e2e" stroke-width="2"/>
  <line x1="143" y1="152" x2="153" y2="162" stroke="#3a3a3a" stroke-width="2"/>
  <!-- Clock labels -->
  <text x="205" y="124" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#3a3a3a">12</text>
  <text x="276" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#333">3</text>
  <text x="205" y="273" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#3a3a3a">6</text>
  <text x="136" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#333">9</text>
  <!-- Hour hand (near 11) -->
  <line x1="205" y1="195" x2="192" y2="137" stroke="#4a4a4a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Minute hand (near 12 - urgency!) -->
  <line x1="205" y1="195" x2="207" y2="134" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Crack -->
  <path d="M205,131 L218,195 L200,191 L215,258" stroke="#E74C3C" stroke-width="1.5" fill="none" opacity="0.35"/>
  <!-- Center -->
  <circle cx="205" cy="195" r="5" fill="#E74C3C" opacity="0.9"/>
  <text x="205" y="284" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600"
        letter-spacing="2" text-anchor="middle" fill="#E74C3C" opacity="0.65">TEMPO SE ESGOTANDO</text>

  <!-- Downward trend line -->
  <polyline points="55,315 95,325 135,320 175,344 215,338 260,360 310,382 375,408"
            stroke="#E74C3C" stroke-width="2" fill="none" opacity="0.55" stroke-linejoin="round"/>
  <polygon points="371,404 379,404 375,416" fill="#E74C3C" opacity="0.7"/>

  <!-- Old gear -->
  <g transform="translate(90,355)" opacity="0.35">
    <circle r="26" fill="none" stroke="#3a3a3a" stroke-width="3.5"/>
    <circle r="17" fill="#111" stroke="#2a2a2a" stroke-width="2"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(0,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(45,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(90,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(135,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(180,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(225,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(270,0,0)"/>
    <rect x="-4" y="-30" width="8" height="8" rx="1.5" fill="#3a3a3a" transform="rotate(315,0,0)"/>
  </g>

  <!-- Left badge -->
  <rect x="40" y="432" width="320" height="34" rx="6" fill="rgba(231,76,60,0.1)" stroke="rgba(231,76,60,0.22)" stroke-width="1"/>
  <text x="200" y="455" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="#E74C3C">− 40% competitividade por ano sem IA</text>

  <!-- ═══ CENTER — Transformation ═══ (unchanged) -->
  <ellipse cx="440" cy="240" rx="36" ry="75" fill="#7B2FBE" opacity="0.1" filter="url(#softGlow)"/>
  <!-- Lightning bolt -->
  <path d="M440,148 L423,248 L440,241 L423,332 L457,233 L440,241 Z"
        fill="url(#techG)" filter="url(#glow)" opacity="0.95"/>
  <text x="440" y="138" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="800"
        letter-spacing="3" text-anchor="middle" fill="#9B59B6" opacity="0.8">IA</text>
  <text x="440" y="354" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600"
        letter-spacing="2" text-anchor="middle" fill="rgba(52,152,219,0.5)">SINATECNO</text>

  <!-- ═══ RIGHT — DEPOIS ═══ -->
  <text x="670" y="38" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700"
        letter-spacing="5" text-anchor="middle" fill="#27AE60" opacity="0.85">D E P O I S</text>

  <!-- Stars / sparkles -->
  <circle cx="490" cy="68" r="2.5" fill="#F1C40F" opacity="0.9"/>
  <circle cx="525" cy="48" r="2" fill="#F1C40F" opacity="0.7"/>
  <circle cx="570" cy="78" r="3" fill="#F1C40F" opacity="0.8"/>
  <circle cx="620" cy="44" r="2" fill="#3498DB" opacity="0.9"/>
  <circle cx="715" cy="40" r="2" fill="#9B59B6" opacity="0.9"/>
  <circle cx="760" cy="68" r="2.5" fill="#F1C40F" opacity="0.8"/>
  <circle cx="808" cy="52" r="2" fill="#27AE60" opacity="0.9"/>
  <circle cx="845" cy="44" r="2.5" fill="#F1C40F" opacity="0.7"/>
  <circle cx="505" cy="108" r="1.2" fill="#fff" opacity="0.25"/>
  <circle cx="555" cy="90" r="1.2" fill="#fff" opacity="0.2"/>
  <circle cx="595" cy="115" r="1.2" fill="#fff" opacity="0.25"/>
  <circle cx="642" cy="92" r="1.2" fill="#fff" opacity="0.2"/>
  <circle cx="735" cy="86" r="1.2" fill="#fff" opacity="0.2"/>
  <circle cx="785" cy="105" r="1.2" fill="#fff" opacity="0.25"/>
  <circle cx="830" cy="78" r="1.2" fill="#fff" opacity="0.2"/>

  <!-- ═══ ROCKET (improved) ═══ -->
  <g transform="translate(698,210)">

    <!-- Exhaust glow halo -->
    <ellipse cx="0" cy="72" rx="28" ry="55" fill="#F1C40F" opacity="0.07" filter="url(#flameGlow)"/>

    <!-- Exhaust — outer plume -->
    <path d="M-18,36 Q0,100 18,36 Q11,74 0,108 Q-11,74 -18,36 Z"
          fill="#E74C3C" opacity="0.35" filter="url(#flameGlow)"/>
    <!-- Exhaust — mid plume -->
    <path d="M-13,38 Q0,88 13,38 Q8,66 0,92 Q-8,66 -13,38 Z"
          fill="#E67E22" opacity="0.55"/>
    <!-- Exhaust — inner bright -->
    <path d="M-9,40 Q0,76 9,40 Q5,58 0,78 Q-5,58 -9,40 Z"
          fill="#F1C40F" opacity="0.8"/>
    <!-- Exhaust — core white -->
    <path d="M-5,42 Q0,64 5,42 Q3,54 0,66 Q-3,54 -5,42 Z"
          fill="url(#flameG)" opacity="0.9"/>

    <!-- Nozzle bell -->
    <path d="M-16,34 L16,34 L20,44 L-20,44 Z"
          fill="#0d1020" stroke="rgba(52,152,219,0.6)" stroke-width="1.5"/>

    <!-- Body main -->
    <path d="M0,-110 Q30,-72 30,12 L0,34 L-30,12 Q-30,-72 0,-110 Z"
          fill="url(#rocketBody)"/>
    <!-- Body right shadow -->
    <path d="M0,-110 Q30,-72 30,12 L16,34 L0,28 L0,-110 Z"
          fill="rgba(0,0,0,0.22)"/>
    <!-- Body highlight strip left -->
    <path d="M-30,-40 Q-26,-72 0,-110 L0,-85 Q-14,-60 -22,-25 Z"
          fill="rgba(255,255,255,0.06)"/>

    <!-- Nose cone -->
    <path d="M0,-110 Q30,-72 30,-56 L0,-46 L-30,-56 Q-30,-72 0,-110 Z"
          fill="url(#rocketNose)"/>
    <!-- Nose highlight -->
    <path d="M0,-110 Q30,-72 30,-68 L16,-60 L0,-55 L0,-110 Z"
          fill="rgba(255,255,255,0.14)"/>

    <!-- Decorative stripe -->
    <rect x="-30" y="-20" width="60" height="7" rx="1" fill="rgba(255,255,255,0.07)"/>
    <rect x="-30" y="4" width="60" height="4" rx="1" fill="rgba(52,152,219,0.2)"/>

    <!-- Porthole window -->
    <circle cy="-38" r="19" fill="#060c1a" stroke="#3498DB" stroke-width="3"/>
    <circle cy="-38" r="14" fill="#0d1a2e" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
    <circle cy="-38" r="8" fill="#3498DB" opacity="0.22"/>
    <!-- Window reflection (gives depth) -->
    <ellipse cx="-6" cy="-45" rx="6" ry="5" fill="rgba(255,255,255,0.28)" transform="rotate(-25,-6,-45)"/>
    <circle cx="-8" cy="-43" r="2.5" fill="rgba(255,255,255,0.18)"/>

    <!-- Left main fin (swept-back) -->
    <path d="M-30,12 L-60,52 L-30,40 Z" fill="#27AE60"/>
    <path d="M-30,12 L-60,52 L-45,46 Z" fill="rgba(0,0,0,0.2)"/>
    <!-- Right main fin -->
    <path d="M30,12 L60,52 L30,40 Z" fill="#27AE60"/>
    <path d="M30,12 L60,52 L45,46 Z" fill="rgba(0,0,0,0.15)"/>

    <!-- Left canard (top stabilizer) -->
    <path d="M-30,-65 L-50,-42 L-30,-52 Z" fill="#27AE60" opacity="0.75"/>
    <!-- Right canard -->
    <path d="M30,-65 L50,-42 L30,-52 Z" fill="#27AE60" opacity="0.75"/>

    <!-- Speed lines (motion blur) -->
    <line x1="-75" y1="-22" x2="-34" y2="-22" stroke="rgba(255,255,255,0.16)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-80" y1="-4"  x2="-34" y2="-4"  stroke="rgba(255,255,255,0.12)" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-75" y1="14"  x2="-34" y2="14"  stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-68" y1="30"  x2="-34" y2="30"  stroke="rgba(255,255,255,0.05)" stroke-width="1"   stroke-linecap="round"/>
  </g>

  <!-- Growth chart — upward trend (shifted left to leave room for rocket) -->
  <polyline points="475,415 510,394 548,368 588,338 624,308 658,274 690,242 722,208 756,172 784,142"
            stroke="url(#upG)" stroke-width="2.5" fill="none" opacity="0.75" stroke-linejoin="round"/>
  <!-- Area fill -->
  <polygon points="475,415 510,394 548,368 588,338 624,308 658,274 690,242 722,208 756,172 784,142 784,425 475,425"
           fill="url(#areaG)"/>
  <!-- Glowing dot at peak -->
  <circle cx="784" cy="142" r="7" fill="#27AE60" opacity="0.9" filter="url(#glow)"/>
  <circle cx="784" cy="142" r="3.5" fill="#fff" opacity="0.9"/>

  <!-- AI network nodes (lower-left of right panel) -->
  <g opacity="0.72">
    <circle cx="497" cy="322" r="9.5" fill="rgba(52,152,219,0.18)" stroke="#3498DB" stroke-width="1.5"/>
    <circle cx="540" cy="292" r="7"   fill="rgba(52,152,219,0.14)" stroke="#3498DB" stroke-width="1.2"/>
    <circle cx="518" cy="356" r="6"   fill="rgba(155,89,182,0.18)" stroke="#9B59B6" stroke-width="1.2"/>
    <circle cx="564" cy="332" r="8.5" fill="rgba(52,152,219,0.14)" stroke="#3498DB" stroke-width="1.5"/>
    <circle cx="546" cy="372" r="5"   fill="rgba(39,174,96,0.2)"   stroke="#27AE60"  stroke-width="1"/>
    <circle cx="582" cy="354" r="6"   fill="rgba(39,174,96,0.14)"  stroke="#27AE60"  stroke-width="1.2"/>
    <line x1="497" y1="322" x2="540" y2="292" stroke="rgba(52,152,219,0.32)" stroke-width="1.2"/>
    <line x1="497" y1="322" x2="518" y2="356" stroke="rgba(52,152,219,0.28)" stroke-width="1"/>
    <line x1="540" y1="292" x2="564" y2="332" stroke="rgba(52,152,219,0.28)" stroke-width="1"/>
    <line x1="518" y1="356" x2="564" y2="332" stroke="rgba(155,89,182,0.22)" stroke-width="1"/>
    <line x1="564" y1="332" x2="546" y2="372" stroke="rgba(39,174,96,0.22)"  stroke-width="1"/>
    <line x1="546" y1="372" x2="582" y2="354" stroke="rgba(39,174,96,0.22)"  stroke-width="1"/>
  </g>

  <!-- Right badge -->
  <rect x="600" y="426" width="258" height="42" rx="8" fill="rgba(39,174,96,0.09)" stroke="rgba(39,174,96,0.22)" stroke-width="1"/>
  <text x="729" y="447" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="800"
        text-anchor="middle" fill="#27AE60">+300% eficiência · −80% custo</text>
  <text x="729" y="463" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="500"
        text-anchor="middle" fill="rgba(255,255,255,0.4)">Sinatecno TI — IA &amp; Tecnologia</text>

  <!-- Dividing dashed line -->
  <line x1="440" y1="55" x2="440" y2="465" stroke="url(#techG)" stroke-width="1"
        stroke-dasharray="4,7" opacity="0.3"/>
</svg>
